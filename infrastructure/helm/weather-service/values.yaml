# This project was developed with assistance from AI tools.

replicaCount: 1

image:
  repository: quay.io/jary/grid-resilience-weather-service
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: weather-service

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

kafka:
  bootstrapServers: grid-kafka-bootstrap.grid-ops-infra.svc.cluster.local:9092
  securityProtocol: PLAINTEXT

corrdiffNimUrl: http://corrdiff-nim.grid-ops-ai.svc.cluster.local:8000

env: {}
