apiVersion: v1
kind: Service
metadata:
  name: weather-service
  labels:
    {{- include "weather-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "weather-service.selectorLabels" . | nindent 4 }}
