# This project was developed with assistance from AI tools.

replicaCount: 1

image:
  repository: quay.io/jary/grid-resilience-console-backend
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: console-backend

service:
  port: 8090

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

kafka:
  bootstrapServers: grid-kafka-kafka-bootstrap.grid-ops-infra.svc.cluster.local:9092
  securityProtocol: PLAINTEXT

database:
  host: grid-postgres-ha.grid-ops-infra.svc.cluster.local
  port: 5432
  name: gridops
  user: gridops

upstreamServices:
  weatherService: http://weather-service.grid-ops-services.svc.cluster.local:8080
  riskEngine: http://risk-engine.grid-ops-services.svc.cluster.local:8080
  defectDetector: http://defect-detector.grid-ops-services.svc.cluster.local:8080
  dispatchOptimizer: http://dispatch-optimizer.grid-ops-services.svc.cluster.local:8080
  scenarioEngine: http://scenario-engine.grid-ops-services.svc.cluster.local:8080

route:
  timeout: 300s

env: {}
