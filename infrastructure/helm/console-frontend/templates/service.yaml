apiVersion: v1
kind: Service
metadata:
  name: console-frontend
  labels:
    {{- include "console-frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "console-frontend.selectorLabels" . | nindent 4 }}
