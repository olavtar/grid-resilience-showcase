apiVersion: v1
kind: Service
metadata:
  name: scenario-engine
  labels:
    {{- include "scenario-engine.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "scenario-engine.selectorLabels" . | nindent 4 }}
