apiVersion: v1
kind: Service
metadata:
  name: kit-substation
  namespace: {{ include "kit-substation.namespace" . }}
  labels:
    app.kubernetes.io/name: kit-substation
    {{- include "kit-substation.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 49100
      targetPort: signaling
      protocol: TCP
      name: signaling
  selector:
    app.kubernetes.io/name: kit-substation
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kit-substation
  namespace: {{ include "kit-substation.namespace" . }}
  labels:
    {{- include "kit-substation.labels" . | nindent 4 }}
