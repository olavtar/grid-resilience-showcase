# This project was developed with assistance from AI tools.
# Adapted from nvidia-kit-app-streaming isaac-sim-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kit-substation
  namespace: {{ include "kit-substation.namespace" . }}
  labels:
    app.kubernetes.io/name: kit-substation
    {{- include "kit-substation.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kit-substation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kit-substation
    spec:
      serviceAccountName: kit-substation
      {{- if .Values.ngc.apiKey }}
      imagePullSecrets:
        - name: ngc-pull-secret
      {{- end }}
      nodeSelector:
        nvidia.com/gpu.product: {{ .Values.kitSubstation.gpu.product }}
      runtimeClassName: {{ .Values.kitSubstation.gpu.runtimeClassName }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: kit-substation
          image: "{{ .Values.kitSubstation.image.repository }}:{{ .Values.kitSubstation.image.tag }}"
          imagePullPolicy: {{ .Values.kitSubstation.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              ./runheadless.sh \
                --/app/livestream/webrtcEnabled=true \
                --/app/livestream/streamViewOnly=true
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: PRIVACY_CONSENT
              value: "Y"
            - name: OMNI_KIT_ACCEPT_EULA
              value: "Y"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "all"
            - name: SCENE_QUALITY
              value: {{ .Values.kitSubstation.sceneQuality | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: KAFKA_CONSUMER_GROUP_ID
              value: "kit-substation"
          ports:
            - name: signaling
              containerPort: 49100
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.kitSubstation.resources.requests.cpu | quote }}
              memory: {{ .Values.kitSubstation.resources.requests.memory }}
              nvidia.com/gpu: 1
            limits:
              cpu: {{ .Values.kitSubstation.resources.limits.cpu | quote }}
              memory: {{ .Values.kitSubstation.resources.limits.memory }}
              nvidia.com/gpu: 1
          volumeMounts:
            - name: cache
              mountPath: /opt/nvidia/omniverse/.cache/ov
              subPath: cache
            - name: cache
              mountPath: /opt/nvidia/omniverse/.nv/ComputeCache
              subPath: compute-cache
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: signaling
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          livenessProbe:
            tcpSocket:
              port: signaling
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
        - name: tls-proxy
          image: docker.io/nginx:1.27-alpine
          ports:
            - name: signaling-tls
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: tls-proxy-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: signaling-tls
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: kit-substation-cache
        - name: tmp
          emptyDir:
            sizeLimit: 10Gi
        - name: tls
          secret:
            secretName: coturn-tls
        - name: tls-proxy-conf
          configMap:
            name: tls-proxy-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kit-substation-cache
  namespace: {{ include "kit-substation.namespace" . }}
  labels:
    app.kubernetes.io/name: kit-substation
    {{- include "kit-substation.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.kitSubstation.cache.storageClass }}
  storageClassName: {{ .Values.kitSubstation.cache.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.kitSubstation.cache.size }}
