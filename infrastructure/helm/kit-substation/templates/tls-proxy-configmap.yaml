apiVersion: v1
kind: ConfigMap
metadata:
  name: tls-proxy-config
  namespace: {{ include "kit-substation.namespace" . }}
  labels:
    app.kubernetes.io/name: kit-substation
    {{- include "kit-substation.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes 1;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;
    events { worker_connections 256; }

    stream {
        upstream kit_signaling {
            server 127.0.0.1:49100;
        }

        server {
            listen 8443 ssl;

            ssl_certificate     /etc/nginx/tls/tls.crt;
            ssl_certificate_key /etc/nginx/tls/tls.key;
            ssl_protocols       TLSv1.2 TLSv1.3;

            proxy_pass kit_signaling;
        }
    }
