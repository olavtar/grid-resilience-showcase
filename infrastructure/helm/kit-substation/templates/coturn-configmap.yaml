apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
  namespace: {{ include "kit-substation.namespace" . }}
  labels:
    app.kubernetes.io/name: coturn
    {{- include "kit-substation.labels" . | nindent 4 }}
data:
  turnserver.conf: |
    listening-port=3478
    tls-listening-port=5349
    listening-ip=0.0.0.0
    relay-ip=0.0.0.0
    min-port=49200
    max-port=49300
    fingerprint
    lt-cred-mech
    realm=grid-ops-ai.cluster.local
    user={{ .Values.coturn.username }}:TURN_PASSWORD_PLACEHOLDER
    cert=/etc/coturn/tls/tls.crt
    pkey=/etc/coturn/tls/tls.key
    no-tlsv1
    no-tlsv1_1
    no-multicast-peers
    no-cli
    simple-log
    log-file=stdout
    verbose
