# This project was developed with assistance from AI tools.

replicaCount: 1

image:
  repository: quay.io/jary/grid-resilience-defect-detector
  tag: latest
  pullPolicy: Always

serviceAccount:
  create: true
  name: defect-detector

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

kafka:
  bootstrapServers: grid-kafka-kafka-bootstrap.grid-ops-infra.svc.cluster.local:9092
  securityProtocol: PLAINTEXT

database:
  host: grid-postgres-ha.grid-ops-infra.svc.cluster.local
  port: 5432
  name: gridops
  user: gridops

vllmBaseUrl: http://vllm-cosmos.grid-ops-ai.svc.cluster.local:8000
vllmModel: nvidia/Cosmos-Reason2-8B

env: {}
