apiVersion: v1
kind: Service
metadata:
  name: risk-engine
  labels:
    {{- include "risk-engine.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "risk-engine.selectorLabels" . | nindent 4 }}
