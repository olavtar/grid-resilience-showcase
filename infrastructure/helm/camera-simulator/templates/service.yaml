apiVersion: v1
kind: Service
metadata:
  name: camera-simulator
  labels:
    {{- include "camera-simulator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "camera-simulator.selectorLabels" . | nindent 4 }}
