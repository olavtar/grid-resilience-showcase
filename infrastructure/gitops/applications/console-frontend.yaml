# This project was developed with assistance from AI tools.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: console-frontend
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: grid-resilience
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: grid-resilience
  source:
    repoURL: https://github.com/jeremyary/grid-resilience-showcase.git
    targetRevision: main
    path: infrastructure/helm/console-frontend
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: grid-ops-console
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
