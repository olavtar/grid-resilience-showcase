# This project was developed with assistance from AI tools.
# Wave 1: Infrastructure — Kafka cluster, PostgreSQL cluster, namespaces
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grid-infra
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: grid-resilience
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: grid-resilience
  source:
    repoURL: https://github.com/jeremyary/grid-resilience-showcase.git
    targetRevision: main
    path: infrastructure/cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: grid-ops-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
