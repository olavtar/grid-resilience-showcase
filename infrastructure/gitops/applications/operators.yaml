# This project was developed with assistance from AI tools.
# Wave 0: Operator subscriptions — GPU Operator, AMQ Streams, Crunchy PGO
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grid-operators
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: grid-resilience
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: grid-resilience
  source:
    repoURL: https://github.com/olavtar/grid-resilience-showcase.git
    targetRevision: main
    path: infrastructure/operators
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
