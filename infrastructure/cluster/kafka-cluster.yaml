# This project was developed with assistance from AI tools.
# AMQ Streams Kafka cluster (KRaft mode) for the grid ops platform
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: grid-kafka-pool
  namespace: grid-ops-infra
  labels:
    strimzi.io/cluster: grid-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 4Gi
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: grid-kafka
  namespace: grid-ops-infra
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 4.1.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
