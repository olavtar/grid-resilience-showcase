# This project was developed with assistance from AI tools.
# cuOpt — crew dispatch optimization (Apache 2.0, L4 GPU)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cuopt
  namespace: grid-ops-ai
  labels:
    app.kubernetes.io/name: cuopt
    app.kubernetes.io/part-of: grid-resilience
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cuopt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cuopt
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L4
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cuopt
          image: nvidia/cuopt:26.6.0a-cuda12.9-py3.14
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 2
              memory: 4Gi
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /cuopt/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /cuopt/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: cuopt
  namespace: grid-ops-ai
  labels:
    app.kubernetes.io/name: cuopt
    app.kubernetes.io/part-of: grid-resilience
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: cuopt
