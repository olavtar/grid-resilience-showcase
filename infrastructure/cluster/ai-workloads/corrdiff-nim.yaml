# This project was developed with assistance from AI tools.
# CorrDiff NIM — Earth-2 3km weather downscaling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corrdiff-nim
  namespace: grid-ops-ai
  labels:
    app.kubernetes.io/name: corrdiff-nim
    app.kubernetes.io/part-of: grid-resilience
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: corrdiff-nim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corrdiff-nim
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      imagePullSecrets:
        - name: ngc-pull-secret
      containers:
        - name: corrdiff
          image: nvcr.io/nim/nvidia/corrdiff:latest
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-key
                  key: key
          volumeMounts:
            - name: cache
              mountPath: /opt/nim/.cache
            - name: shm
              mountPath: /dev/shm
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 2
              memory: 16Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 8
              memory: 48Gi
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 10
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 50Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: corrdiff-nim
  namespace: grid-ops-ai
  labels:
    app.kubernetes.io/name: corrdiff-nim
    app.kubernetes.io/part-of: grid-resilience
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: corrdiff-nim
