# This project was developed with assistance from AI tools.
# vLLM serving Cosmos Reason 2-8B for defect detection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-cosmos
  namespace: grid-ops-ai
  labels:
    app.kubernetes.io/name: vllm-cosmos
    app.kubernetes.io/part-of: grid-resilience
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-cosmos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-cosmos
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - --model
            - nvidia/Cosmos-Reason2-8B
            - --reasoning-parser
            - qwen3
            - --gpu-memory-utilization
            - "0.9"
            - --max-model-len
            - "16384"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 2
              memory: 16Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 8
              memory: 48Gi
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-cosmos
  namespace: grid-ops-ai
  labels:
    app.kubernetes.io/name: vllm-cosmos
    app.kubernetes.io/part-of: grid-resilience
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: vllm-cosmos
