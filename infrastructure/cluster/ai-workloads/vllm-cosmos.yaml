# This project was developed with assistance from AI tools.
# vLLM serving Cosmos Reason 2-8B for defect detection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-cosmos
  namespace: grid-ops-ai
  labels:
    app.kubernetes.io/name: vllm-cosmos
    app.kubernetes.io/part-of: grid-resilience
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-cosmos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-cosmos
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: write-hf-token
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /cache/hf && echo -n $HF_TOKEN_VALUE > /cache/hf/token"]
          env:
            - name: HF_TOKEN_VALUE
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
          volumeMounts:
            - name: cache
              mountPath: /cache
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.11.0
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - nvidia/Cosmos-Reason2-8B
            - --served-model-name
            - cosmos-reason-2
            - --trust-remote-code
            - --reasoning-parser
            - qwen3
            - --max-model-len
            - "8192"
            - --gpu-memory-utilization
            - "0.9"
            - --dtype
            - bfloat16
            - --limit-mm-per-prompt
            - '{"image":1}'
          env:
            - name: HOME
              value: /cache/home
            - name: XDG_CACHE_HOME
              value: /cache/xdg
            - name: HF_HOME
              value: /cache/hf
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: shm
              mountPath: /dev/shm
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 2
              memory: 16Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 8
              memory: 48Gi
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 50Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-cosmos
  namespace: grid-ops-ai
  labels:
    app.kubernetes.io/name: vllm-cosmos
    app.kubernetes.io/part-of: grid-resilience
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: vllm-cosmos
