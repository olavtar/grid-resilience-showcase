# This project was developed with assistance from AI tools.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        exclude: "^infrastructure/helm/.*/templates/"
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=15000"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy services/common/grid_common services/scenario-engine/scenario_engine services/weather-service/weather_service services/camera-simulator/camera_simulator services/risk-engine/risk_engine services/defect-detector/defect_detector services/dispatch-optimizer/dispatch_optimizer services/console-backend/console_backend
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
