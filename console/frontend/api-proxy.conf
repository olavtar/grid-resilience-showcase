location /api/ {
    proxy_pass http://console-backend.grid-ops-console.svc.cluster.local:8090/api/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
}

location / {
    try_files $uri $uri/ /index.html;
}
