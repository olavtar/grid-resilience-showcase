<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Resilience Ops Center</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Patch RTCPeerConnection with TURN relay BEFORE ES modules load —
      // the NVIDIA streaming library captures a reference at import time.
      (function() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/config.json', false);
        xhr.send();
        if (xhr.status !== 200) { console.warn('[TURN patch] config.json not found, skipping'); return; }
        var cfg = JSON.parse(xhr.responseText);
        if (!cfg.turn || !cfg.turn.urls) { console.warn('[TURN patch] no turn config'); return; }

        var NativeRTC = window.RTCPeerConnection;
        var turnServer = { urls: cfg.turn.urls, username: cfg.turn.username, credential: cfg.turn.credential };

        var Patched = function(config) {
          var p = Object.assign({}, config || {});
          p.iceServers = (p.iceServers || []).concat(turnServer);
          p.iceTransportPolicy = "relay";
          return new NativeRTC(p);
        };
        Patched.prototype = NativeRTC.prototype;
        Object.setPrototypeOf(Patched, NativeRTC);

        try {
          Object.defineProperty(window, "RTCPeerConnection", {
            value: Patched, writable: true, configurable: true,
          });
        } catch(e) {
          window.RTCPeerConnection = Patched;
        }
        console.log('[TURN patch] applied');
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
